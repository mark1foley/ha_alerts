script:
  alert_notify:
    alias: "Alert: Notify"
    description: >
      Central notification routing script for the alert framework.
      Routes to persistent notification, mobile push, and TTS based on severity.
      Sets status_helper to 'notified' after sending notification.
      Badge count is handled by the Alert Framework: Badge Sync automation.
      Called by alert automations - do not call directly from other automations.
    mode: parallel
    max: 20
    fields:
      severity:
        description: "Alert severity level: info | minor | major | critical"
        required: true
        selector:
          select:
            options: [info, minor, major, critical]
      title:
        description: "Short alert title (shown as notification heading)"
        required: true
        selector:
          text:
      message:
        description: "Full alert message body"
        required: true
        selector:
          text:
            multiline: true
      tag:
        description: >
          Unique identifier for this alert (snake_case, e.g. garage_door_open).
          Used to deduplicate and dismiss notifications.
        required: true
        selector:
          text:
      status_helper:
        description: "input_select entity ID for tracking alert status (optional)"
        required: false
        default: ""
        selector:
          text:
      image_path:
        description: "Optional path to image file to attach to mobile notification"
        required: false
        default: ""
        selector:
          text:
      dashboard_url:
        description: >
          Optional Lovelace dashboard URL to navigate to when notification is tapped.
          Falls back to input_text.automated_alert_default_dashboard if empty.
        required: false
        default: ""
        selector:
          text:
      tts_target:
        description: "Optional media_player entity for TTS. If provided, TTS announcement will be spoken when the alert activates."
        required: false
        selector:
          entity:
            domain: media_player

    sequence:

      # ── 1. Persistent notification (all severities) ────────────────────────
      - service: persistent_notification.create
        data:
          title: "[{{ severity | upper }}] {{ title }}"
          message: "{{ message }}"
          notification_id: "alert_{{ tag }}"

      # ── 2. Mobile push (minor, major, critical) ────────────────────────────
      - if:
          - condition: template
            value_template: "{{ severity in ['minor', 'action', 'major', 'critical'] }}"
        then:
          - service: "notify.{{ severity }}_audience"
            data:
              title: "[{{ severity | upper }}] {{ title }}"
              message: "{{ message }}"
              data:
                tag: "alert_{{ tag }}"
                channel: "{{ severity }}"
                # Navigate to per-alert dashboard or global default on notification tap
                url: >-
                  {% if dashboard_url != '' %}
                    {{ dashboard_url }}
                  {% else %}
                    {{ states('input_text.automated_alert_default_dashboard') }}
                  {% endif %}
                # Attach image if provided
                image: >-
                  {% if image_path != '' %}{{ image_path }}{% endif %}
                push:
                  interruption-level: >-
                    {% if severity == 'critical' %}critical
                    {% elif severity == 'major' %}time-sensitive
                    {% else %}active{% endif %}
                actions:
                  - action: "ACK_{{ tag | upper }}"
                    title: Acknowledge
                    destructive: false

      # ── 3. TTS (only when tts_target explicitly provided) ─────────────────
      - if:
          - condition: template
            value_template: "{{ tts_target is defined and tts_target != '' }}"
        then:
          - service: tts.speak
            data:
              media_player_entity_id: "{{ tts_target }}"
              message: "Alert. {{ title }}. {{ message }}"

      # ── 4. Set status_helper to notified ──────────────────────────────────
      - if:
          - condition: template
            value_template: "{{ status_helper != '' }}"
        then:
          - service: input_select.select_option
            target:
              entity_id: "{{ status_helper }}"
            data:
              option: notified