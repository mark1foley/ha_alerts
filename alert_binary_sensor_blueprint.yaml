# Alert Binary Sensor Blueprint
# ─────────────────────────────────────────────────────────────────────────────
# Creates an alert binary sensor with a consistent attribute schema for use
# with the alert framework. The sensor is automatically picked up by the
# shared alert automations, badge sync, badge counter, and dashboard card
# via the binary_sensor.automated_alert_sensors group.
#
# Usage: Add a use_blueprint entry to your templates.yaml for each alert.
#
# Example:
#   - use_blueprint:
#       path: mark1foley/alert_binary_sensor_blueprint.yaml
#       input:
#         trigger_entity: cover.garage_door
#         trigger_state: 'open'
#         severity: major
#         title: Garage Door Open
#         message: The garage door has been open and no one is home
#         tag: garage_door_open
#         status_helper: input_select.alert_status_garage_door_open
#         dashboard_url: /lovelace/security
#     unique_id: alert_garage_door_open
#
# After adding a new alert:
#   1. Create a Dropdown helper in the UI with options: idle, notified, acknowledged
#      Naming convention: Alert Status <descriptive name>
#      Entity ID will be: input_select.alert_status_<tag>
#      (acknowledged is only needed for major and critical alerts)
#   2. Add use_blueprint entry to templates.yaml with unique_id
#   3. Add binary_sensor.alert_<tag> to binary_sensor.automated_alert_sensors group in UI
#   4. Reload template entities (Developer Tools > YAML > Template entities)
#   5. Restart HA if blueprint file has changed
#   6. Tag the binary sensor with the Alert label in the UI
#
# Attributes produced on the binary sensor:
#   automated_alert: true   (self-documenting flag)
#   trigger_state:          The state that activates this alert
#   severity:               info | minor | major | critical
#   title:                  Short alert title
#   message:                Full alert message
#   tag:                    Unique snake_case identifier
#   status_helper:          input_select entity ID or empty string
#   image_path:             Path to image file or empty string
#   dashboard_url:          Lovelace URL or empty string (falls back to global default)
#
# Entity ID and friendly name are derived automatically from the tag:
#   tag: garage_door_open
#   -> entity ID:      binary_sensor.alert_garage_door_open
#   -> friendly name:  Alert Garage Door Open
#
# Framework constants referenced:
#   input_text.automated_alert_default_dashboard  - global default dashboard URL
#   binary_sensor.automated_alert_sensors         - group of all alert sensors
#   sensor.automated_alert_active_count           - active alert count for badge
# ─────────────────────────────────────────────────────────────────────────────

blueprint:
  name: Alert Binary Sensor
  description: Creates an alert binary sensor with a consistent attribute schema for use with the alert framework.
  domain: template
  author: mark1foley
  homeassistant:
    min_version: "2024.6.0"
  source_url: https://github.com/mark1foley/ha_alerts/blob/main/alert_binary_sensor_blueprint.yaml

  input:
    trigger_entity:
      name: Trigger entity
      description: >
        The entity whose state determines whether this alert is active.
        Can be any entity with a stable state value - binary sensor, input boolean,
        switch, cover etc. For complex conditions (numeric thresholds, multiple
        entities), create a template binary sensor first and reference it here.
      selector:
        entity:

    trigger_state:
      name: Trigger state
      description: >
        The state of the trigger entity that means the alert is active.
        Common values: on, off, open, unavailable, unlocked.
        Note - use single quotes in templates.yaml to prevent YAML
        interpreting on/off as booleans (e.g. trigger_state: 'on').
      default: "on"
      selector:
        text:

    severity:
      name: Severity
      description: >
        Controls notification channels, interruption level, and repeat behaviour.
        info - persistent notification only, no mobile push, no repeat.
        minor - mobile push (normal priority), no repeat.
        major - mobile push (time-sensitive), repeats every 15 min, acknowledgeable.
        critical - mobile push (critical), repeats every 5 min, acknowledgeable. TTS if tts_target specified.
      selector:
        select:
          options:
            - label: "Info - persistent notification only"
              value: info
            - label: "Minor - mobile push, no repeat"
              value: minor
            - label: "Major - mobile push, repeats every 15 min, acknowledgeable"
              value: major
            - label: "Critical - mobile push, TTS, repeats every 5 min, acknowledgeable"
              value: critical

    title:
      name: Alert title
      description: Short title shown as the notification heading. Keep it concise.
      selector:
        text:

    message:
      name: Alert message
      description: >
        Full message body providing context about the alert condition.
        For dynamic messages referencing current entity states, keep this
        static and rely on the notification script for runtime context.
      selector:
        text:
          multiline: true

    tag:
      name: Alert tag
      description: >
        Unique snake_case identifier for this alert (e.g. garage_door_open).
        Must be unique across all alerts. Used to deduplicate and dismiss
        notifications across persistent and mobile channels.
        Convention - describe the condition not the entity:
        garage_door_open rather than cover_garage_door.
        The entity ID and friendly name are derived from this value.
      selector:
        text:

    status_helper:
      name: Status helper (optional)
      description: >
        A Dropdown (input_select) helper to track alert status.
        Must have three options: idle, notified, acknowledged.
        Create in UI: Settings > Helpers > Add Helper > Dropdown
        Naming convention: Alert Status <descriptive name>
        Entity ID convention: input_select.alert_status_<tag>
        Recommended for all alerts. Required for major and critical.
        Leave empty for info alerts only.
      default: ""
      selector:
        entity:
          domain: input_select

    image_path:
      name: Alert image path (optional)
      description: >
        Path to an image file to attach to the mobile notification.
        The upstream process (camera automation etc.) is responsible for
        capturing and storing the image before the alert fires.
        Save to /config/www/alerts/<tag>.jpg
        Reference as /local/alerts/<tag>.jpg
        Leave empty for text-only alerts.
      default: ""
      selector:
        text:

    dashboard_url:
      name: Dashboard URL (optional)
      description: >
        Lovelace dashboard to navigate to when the notification is tapped.
        e.g. /lovelace/security, /lovelace/climate
        If left empty the global default from
        input_text.automated_alert_default_dashboard is used.
      default: ""
      selector:
        text:

# ── Variables ─────────────────────────────────────────────────────────────────
# Only trigger_entity is used in the state/availability templates to ensure
# reactive updates. All other inputs are stored as static attributes.

variables:
  trigger_entity: !input trigger_entity
  trigger_state: !input trigger_state
  tag: !input tag
  severity: !input severity
  title: !input title
  message: !input message
  status_helper: !input status_helper
  image_path: !input image_path
  dashboard_url: !input dashboard_url

# ── Binary sensor definition ──────────────────────────────────────────────────
# Name is derived from tag for consistent entity IDs.
# unique_id must be specified in the use_blueprint entry in templates.yaml.

binary_sensor:
  name: "Alert {{ tag | replace('_', ' ') | title }}"
  state: "{{ states(trigger_entity) == trigger_state }}"
  availability: >-
    {% if trigger_state in ('unavailable', 'unknown') %}
      true
    {% else %}
      {{ states(trigger_entity) not in ('unknown', 'unavailable') }}
    {% endif %}
  device_class: problem
  attributes:
    automated_alert: "{{ true }}"
    trigger_state: "{{ trigger_state }}"
    severity: "{{ severity }}"
    title: "{{ title }}"
    message: "{{ message }}"
    tag: "{{ tag }}"
    status_helper: "{{ status_helper }}"
    image_path: "{{ image_path }}"
    dashboard_url: "{{ dashboard_url }}"