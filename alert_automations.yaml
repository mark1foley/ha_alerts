###############################################################################
# alert_automations.yaml
#
# Paste this file's contents into your automations.yaml file, or include it
# via split configuration. Each automation is correctly formatted as a list
# item for use in automations.yaml.
#
# All automations reference binary_sensor.automated_alert_sensors to identify
# alert binary sensors. Add new alert sensors to this group via the UI.
###############################################################################


###############################################################################
# AUTOMATION 1: Alert Framework - State Change
#
# Triggered by sensor.automated_alert_active_count. Uses queued mode so
# every count change is processed sequentially. Loops through all recently
# changed entities in the appropriate state. Uses status_helper to prevent
# duplicate notifications — only notifies if status is idle.
###############################################################################

- id: alert_framework_state_change
  alias: "Alert Framework: State Change"
  description: >
    Handles initial notification when an alert activates, and clears
    notifications when an alert resolves. Triggered by changes to
    sensor.automated_alert_active_count. Loops through all recently changed
    alert binary sensors in the appropriate state. Checks status_helper to
    prevent duplicate notifications — only notifies if status is idle.
  mode: queued
  max: 10

  trigger:
    - platform: state
      entity_id: sensor.automated_alert_active_count

  condition:
    - condition: template
      value_template: >
        {{ trigger.to_state.state not in ('unavailable', 'unknown') and
           trigger.from_state.state not in ('unavailable', 'unknown') }}

  action:
    - variables:
        count_increased: >-
          {{ trigger.to_state.state | int(0) > trigger.from_state.state | int(0) }}
        member_ids: >-
          {% if trigger.to_state.state | int(0) > trigger.from_state.state | int(0) %}
            {{ expand('binary_sensor.automated_alert_sensors') |
            selectattr('state', 'eq', 'on') | sort(attribute='last_changed',
            reverse=True) | map(attribute='entity_id') | list }}
          {% else %}
            {{ expand('binary_sensor.automated_alert_sensors') |
            selectattr('state', 'eq', 'off') | sort(attribute='last_changed',
            reverse=True) | map(attribute='entity_id') | list }}
          {% endif %}

    - repeat:
        for_each: "{{ member_ids }}"
        sequence:
          - if:
              - condition: template
                value_template: "{{ count_increased }}"
            then:
              # ── Alert activates ──────────────────────────────────────────
              - variables:
                  status_helper: "{{ state_attr(repeat.item, 'status_helper') or '' }}"
                  skip_first: "{{ state_attr(repeat.item, 'skip_first') or false }}"
                  severity: "{{ state_attr(repeat.item, 'severity') or 'minor' }}"
                  is_idle: >-
                    {% if status_helper != '' %}
                      {{ is_state(status_helper, 'idle') }}
                    {% else %}
                      true
                    {% endif %}

              # Only notify if status is idle (prevents duplicates)
              - if:
                  - condition: template
                    value_template: "{{ is_idle }}"
                then:
                  # If skip_first is true and severity repeats, set to skipped instead of notifying
                  - if:
                      - condition: template
                        value_template: >-
                          {{ skip_first and severity in ['action', 'major', 'critical'] and status_helper != '' }}
                    then:
                      - action: input_select.select_option
                        target:
                          entity_id: "{{ status_helper }}"
                        data:
                          option: skipped
                    else:
                      - action: script.alert_notify
                        data:
                          severity: "{{ severity }}"
                          title: "{{ state_attr(repeat.item, 'title') }}"
                          message: "{{ state_attr(repeat.item, 'message') }}"
                          tag: "{{ state_attr(repeat.item, 'tag') }}"
                          status_helper: "{{ status_helper }}"
                          image_path: "{{ state_attr(repeat.item, 'image_path') or '' }}"
                          dashboard_url: "{{ state_attr(repeat.item, 'dashboard_url') or '' }}"

            else:
              # ── Alert resolves ───────────────────────────────────────────
              - variables:
                  status_helper: "{{ state_attr(repeat.item, 'status_helper') or '' }}"

              - action: script.alert_clear
                data:
                  tag: "{{ state_attr(repeat.item, 'tag') }}"
                  acknowledged: false
                  status_helper: "{{ status_helper }}"


###############################################################################
# AUTOMATION 2: Alert Framework - Repeat
#
# Fires every 5 minutes. Re-notifies active alerts where status is 'notified'
# (not idle, not acknowledged). Major repeats every 15 min, critical every 5 min.
###############################################################################

- id: alert_framework_repeat
  alias: "Alert Framework: Repeat"
  description: >
    Fires every 5 minutes. Re-notifies all active alert sensors where
    status_helper is 'notified', 'idle', or 'skipped'. Acknowledged alerts
    are skipped. Action alerts repeat every 60 min (on the hour).
    Major alerts repeat every 15 min (on clock minutes divisible by 15).
    Critical alerts repeat every 5 min.
    Skipped alerts (skip_first=true) are notified on their first repeat cycle.
  mode: single
  max_exceeded: silent

  trigger:
    - platform: time_pattern
      minutes: "/5"

  action:
    - repeat:
        for_each: >
          {{ expand('binary_sensor.automated_alert_sensors')
              | selectattr('state', 'eq', 'on')
              | selectattr('attributes.severity', 'in', ['action', 'major', 'critical'])
              | map(attribute='entity_id')
              | list }}
        sequence:
          - if:
              - condition: template
                value_template: >
                  {% set status_helper = state_attr(repeat.item, 'status_helper') or '' %}
                  {% set status = states(status_helper) if status_helper != '' else 'idle' %}
                  {% set severity = state_attr(repeat.item, 'severity') %}
                  {{ status in ('notified', 'idle', 'skipped') and (
                      severity == 'critical' or
                      (severity == 'major' and now().minute % 15 == 0) or
                      (severity == 'action' and now().minute == 0)
                    ) }}
            then:
              - action: script.alert_notify
                data:
                  severity: "{{ state_attr(repeat.item, 'severity') }}"
                  title: "{{ state_attr(repeat.item, 'title') }}"
                  message: "{{ state_attr(repeat.item, 'message') }}"
                  tag: "{{ state_attr(repeat.item, 'tag') }}"
                  status_helper: "{{ state_attr(repeat.item, 'status_helper') or '' }}"
                  image_path: "{{ state_attr(repeat.item, 'image_path') or '' }}"
                  dashboard_url: "{{ state_attr(repeat.item, 'dashboard_url') or '' }}"


###############################################################################
# AUTOMATION 3: Alert Framework - Acknowledge
#
# Listens for mobile push notification action button presses matching ACK_<TAG>.
# Sets status_helper to acknowledged, clears mobile tray, stops repeats.
###############################################################################

- id: alert_framework_acknowledge
  alias: "Alert Framework: Acknowledge"
  description: >
    Listens for mobile push notification action button presses matching ACK_<TAG>.
    Sets status_helper to acknowledged, clears mobile tray, stops repeats.
  mode: parallel
  max: 20

  trigger:
    - platform: event
      event_type: mobile_app_notification_action

  condition:
    - condition: template
      value_template: >
        {{ trigger.event.data.action.startswith('ACK_') }}

  action:
    - variables:
        action_tag: >
          {{ trigger.event.data.action | replace('ACK_', '') | lower }}
        matching_sensor: >
          {{ expand('binary_sensor.automated_alert_sensors')
              | selectattr('attributes.tag', 'defined')
              | selectattr('attributes.tag', 'eq', action_tag)
              | list | first | default(none) }}

    - if:
        - condition: template
          value_template: "{{ matching_sensor != none }}"
      then:
        - action: script.alert_clear
          data:
            tag: "{{ action_tag }}"
            acknowledged: true
            status_helper: >-
              {{ state_attr(
                expand('binary_sensor.automated_alert_sensors')
                | selectattr('attributes.tag', 'defined')
                | selectattr('attributes.tag', 'eq', action_tag)
                | map(attribute='entity_id') | list | first | default(''),
                'status_helper') or '' }}


###############################################################################
# AUTOMATION 4: Alert Framework - Badge Sync
#
# Silently updates the app badge count whenever the active alert count changes
# or on HA startup. Uses sensor.automated_alert_active_count as the badge
# value. Runs in queued mode to handle rapid state changes.
###############################################################################

- id: alert_framework_badge_sync
  alias: "Alert Framework: Badge Sync"
  description: >
    Silently updates the app badge count when the active alert count changes
    and on HA startup. Always sets badge to the current active alert count.
    If count is 0 the badge is cleared. Uses delete_alert message which is
    silent on both iOS and Android.
  mode: queued
  max: 10

  trigger:
    - platform: state
      entity_id: sensor.automated_alert_active_count
      id: alert_state_change
    - platform: homeassistant
      event: start
      id: startup

  action:
    - delay: >
        {% if trigger.id == 'startup' %}00:00:30{% else %}00:00:02{% endif %}
    - service: notify.minor_audience
      data:
        message: delete_alert
        data:
          push:
            badge: "{{ states('sensor.automated_alert_active_count') | int }}"