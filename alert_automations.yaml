###############################################################################
# alert_automations.yaml
#
# Paste this file's contents into your automations.yaml file, or include it
# via split configuration. Each automation is correctly formatted as a list
# item for use in automations.yaml.
#
# All automations reference binary_sensor.automated_alert_sensors to identify
# alert binary sensors. Add new alert sensors to this group via the UI.
###############################################################################

###############################################################################
# AUTOMATION 1: Alert Framework - State Change
#
# Triggered by binary_sensor.automated_alert_sensors group — fires when any
# member changes state. trigger.to_state.entity_id identifies which member
# fired. Handles initial notification on activation and full clear on resolution.
###############################################################################

- id: alert_framework_state_change
  alias: "Alert Framework: State Change"
  description: >
    Handles initial notification when an alert activates, and clears
    notifications when an alert resolves. Triggered by state changes on
    binary_sensor.automated_alert_sensors group — fires when any member
    changes state. Reads metadata from the triggering member's attributes.
  mode: parallel
  max: 20

  trigger:
    - platform: state
      entity_id: binary_sensor.automated_alert_sensors
      to: "on"
      id: alert_on
    - platform: state
      entity_id: binary_sensor.automated_alert_sensors
      to: "off"
      id: alert_off

  action:
    - variables:
        severity: "{{ trigger.to_state.attributes.get('severity', 'minor') }}"
        title: "{{ trigger.to_state.attributes.get('title', 'Alert') }}"
        message: "{{ trigger.to_state.attributes.get('message', '') }}"
        tag: "{{ trigger.to_state.attributes.get('tag', trigger.to_state.object_id) }}"
        ack_helper: "{{ trigger.to_state.attributes.get('acknowledged_helper', '') }}"

    - choose:

        # ── Alert activates ────────────────────────────────────────────────────
        - conditions:
            - condition: trigger
              id: alert_on
          sequence:
            - if:
                - condition: template
                  value_template: "{{ ack_helper != '' }}"
              then:
                - service: input_boolean.turn_off
                  target:
                    entity_id: "{{ ack_helper }}"

            - service: script.alert_notify
              data:
                severity: "{{ severity }}"
                title: "{{ title }}"
                message: "{{ message }}"
                tag: "{{ tag }}"

        # ── Alert resolves ─────────────────────────────────────────────────────
        - conditions:
            - condition: trigger
              id: alert_off
          sequence:
            - variables:
                tag_off: "{{ trigger.from_state.attributes.get('tag', trigger.from_state.object_id) }}"
                ack_helper_off: "{{ trigger.from_state.attributes.get('acknowledged_helper', '') }}"

            - if:
                - condition: template
                  value_template: "{{ ack_helper_off != '' }}"
              then:
                - service: input_boolean.turn_off
                  target:
                    entity_id: "{{ ack_helper_off }}"

            - service: script.alert_clear
              data:
                tag: "{{ tag_off }}"
                acknowledged: false


###############################################################################
# AUTOMATION 2: Alert Framework - Repeat
#
# Fires every 5 minutes. Re-notifies active unacknowledged major and critical
# alert sensors. Major repeats every 15 min, critical every 5 min.
###############################################################################

- id: alert_framework_repeat
  alias: "Alert Framework: Repeat"
  description: >
    Fires every 5 minutes. Re-notifies all active, unacknowledged major and
    critical alert sensors. Major alerts repeat every 15 min (on clock minutes
    divisible by 15). Critical alerts repeat every 5 min.
    Note: the gap between first and second notification may be less than the
    full repeat interval depending on when in the cycle the alert activated.
  mode: single
  max_exceeded: silent

  trigger:
    - platform: time_pattern
      minutes: "/5"

  action:
    - repeat:
        for_each: >
          {{ expand('binary_sensor.automated_alert_sensors')
              | selectattr('state', 'eq', 'on')
              | selectattr('attributes.severity', 'in', ['major', 'critical'])
              | list }}
        sequence:
          - variables:
              alert: "{{ repeat.item }}"
              severity: "{{ alert.attributes.severity }}"
              ack_helper: "{{ alert.attributes.get('acknowledged_helper', '') }}"
              is_acknowledged: >
                {% if ack_helper != '' %}
                  {{ is_state(ack_helper, 'on') }}
                {% else %}
                  false
                {% endif %}
              is_due: >
                {% if severity == 'critical' %}
                  true
                {% elif severity == 'major' %}
                  {{ now().minute % 15 == 0 }}
                {% else %}
                  false
                {% endif %}

          - if:
              - condition: template
                value_template: "{{ not is_acknowledged and is_due }}"
            then:
              - service: script.alert_notify
                data:
                  severity: "{{ severity }}"
                  title: "{{ alert.attributes.title }}"
                  message: "{{ alert.attributes.message }}"
                  tag: "{{ alert.attributes.tag }}"


###############################################################################
# AUTOMATION 3: Alert Framework - Acknowledge
#
# Listens for mobile push action button presses. Matches to alert sensor
# via tag, sets ack helper, clears mobile tray, stops repeats.
###############################################################################

- id: alert_framework_acknowledge
  alias: "Alert Framework: Acknowledge"
  description: >
    Listens for mobile push notification action button presses matching ACK_<TAG>.
    Sets the acknowledgement helper for the matching alert, clears the mobile
    notification tray, and stops further repeats.
  mode: parallel
  max: 20

  trigger:
    - platform: event
      event_type: mobile_app_notification_action

  condition:
    - condition: template
      value_template: >
        {{ trigger.event.data.action.startswith('ACK_') }}

  action:
    - variables:
        action_tag: >
          {{ trigger.event.data.action | replace('ACK_', '') | lower }}
        matching_sensor: >
          {{ expand('binary_sensor.automated_alert_sensors')
              | selectattr('attributes.tag', 'defined')
              | selectattr('attributes.tag', 'eq', action_tag)
              | list | first | default(none) }}

    - if:
        - condition: template
          value_template: "{{ matching_sensor != none }}"
      then:
        - variables:
            ack_helper: "{{ matching_sensor.attributes.get('acknowledged_helper', '') }}"

        - if:
            - condition: template
              value_template: "{{ ack_helper != '' }}"
          then:
            - service: input_boolean.turn_on
              target:
                entity_id: "{{ ack_helper }}"

        - service: script.alert_clear
          data:
            tag: "{{ action_tag }}"
            acknowledged: true


###############################################################################
# AUTOMATION 4: Alert Framework - Startup Badge Sync
#
# Fires 30 seconds after HA starts. Syncs badge count on all devices once
# all entity states have been restored after restart.
###############################################################################

- id: alert_framework_startup_sync
  alias: "Alert Framework: Startup Badge Sync"
  description: >
    Syncs the app badge count 30 seconds after HA starts. Gives time for all
    entity states to be restored before reading the active alert count.
  mode: single

  trigger:
    - platform: homeassistant
      event: start

  action:
    - delay: "00:00:30"
    - service: notify.minor_audience
      data:
        message: "{{ states('sensor.automated_alerts_active_count') }}"
        data:
          push:
            badge: "{{ states('sensor.automated_alerts_active_count') | int }}"